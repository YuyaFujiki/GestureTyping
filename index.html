<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>p5MediaPipe Hand Gesture Recognition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>


  <body>
    <div class="container-lg">
      <div class="row mb-2">
        <div class="col-12 text-center">
          <h1 class="display-1 mt-5 mb-4">
            Gesture Typing
          </h1>
          <button id="button_webcam" disabled onclick="startWebcam();" class="btn btn-primary mb-2">
            Model Loading...
          </button>
        </div>
      </div>
      <!-- カメラ映像 + 両脇に手のエリアパネル -->
      <div class="row">
        <div class="col-12">
          <div style="display: flex; align-items: stretch; justify-content: center; gap: 12px;">

            <!-- 左手パネル -->
            <div style="display: flex; flex-direction: column; justify-content: center; gap: 6px; min-width: 80px; width: 80px;">
              <div style="font-size: 0.95em; font-weight: bold; text-align: center; color: #444; margin-bottom: 4px;">左手</div>
              <div id="left-top" class="zone-btn" style="
                padding: 0;
                border-radius: 8px;
                text-align: center;
                font-size: 1.3em;
                font-weight: bold;
                background: #e0f2fe;
                color: #0369a1;
                border: 3px solid #bae6fd;
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
              ">上</div>
              <div id="left-middle" class="zone-btn" style="
                padding: 0;
                border-radius: 8px;
                text-align: center;
                font-size: 1.3em;
                font-weight: bold;
                background: #fef9c3;
                color: #854d0e;
                border: 3px solid #fde047;
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
              ">中</div>
              <div id="left-bottom" class="zone-btn" style="
                padding: 0;
                border-radius: 8px;
                text-align: center;
                font-size: 1.3em;
                font-weight: bold;
                background: #f3e8ff;
                color: #6b21a8;
                border: 3px solid #d8b4fe;
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
              ">下</div>
            </div>

            <!-- カメラ映像 -->
            <div id="canvas" style="flex: 1; min-width: 0;"></div>

            <!-- 右手パネル -->
            <div style="display: flex; flex-direction: column; justify-content: center; gap: 6px; min-width: 80px; width: 80px;">
              <div style="font-size: 0.95em; font-weight: bold; text-align: center; color: #444; margin-bottom: 4px;">右手</div>
              <div id="right-top" class="zone-btn" style="
                padding: 0;
                border-radius: 8px;
                text-align: center;
                font-size: 1.3em;
                font-weight: bold;
                background: #e0f2fe;
                color: #0369a1;
                border: 3px solid #bae6fd;
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
              ">上</div>
              <div id="right-middle" class="zone-btn" style="
                padding: 0;
                border-radius: 8px;
                text-align: center;
                font-size: 1.3em;
                font-weight: bold;
                background: #fef9c3;
                color: #854d0e;
                border: 3px solid #fde047;
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
              ">中</div>
              <div id="right-bottom" class="zone-btn" style="
                padding: 0;
                border-radius: 8px;
                text-align: center;
                font-size: 1.3em;
                font-weight: bold;
                background: #f3e8ff;
                color: #6b21a8;
                border: 3px solid #d8b4fe;
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
              ">下</div>
            </div>

          </div>
        </div>

        <!-- テキスト入力カード -->
        <div class="col-12 text-center">
          <div class="card mt-2">
            <div class="card-header">
              <h5 class="card-title"></h5>
              <h5 id="message" class="card-subtitle mb-2 fw-bold">
                Press the start button to begin the challenge
              </h5>
            </div>
            <div class="card-body">
              <input type="text" style="font-size:1.5em; padding:0.5em;" class="form-control" value="">
            </div>
          </div>
        </div>
      </div>

      <style>
        .zone-btn.active-top {
          background: #0ea5e9 !important;
          color: #fff !important;
          border-color: #0369a1 !important;
        }
        .zone-btn.active-middle {
          background: #facc15 !important;
          color: #78350f !important;
          border-color: #ca8a04 !important;
        }
        .zone-btn.active-bottom {
          background: #a855f7 !important;
          color: #fff !important;
          border-color: #7e22ce !important;
        }
      </style>


      <!-- include js libraries -->
      <script src=" ./js/drawing_utils.js" crossorigin="anonymous"></script>
      <script src="./js/hands.js" crossorigin="anonymous"></script>
      <script src="./js/p5.js"></script>
      <script src="./js/sketch.js"></script>
      <script type="module" src="./js/script.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>

  </body>

</html>
